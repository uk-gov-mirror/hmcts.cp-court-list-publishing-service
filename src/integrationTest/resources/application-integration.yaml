spring:
  profiles:
    active: integration
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jms.JmsAutoConfiguration

# COMMON_PLATFORM_QUERY_API_BASE_URL can override base URL (e.g. in static blocks or env)
common-platform-query-api:
  base-url: ${COMMON_PLATFORM_QUERY_API_BASE_URL:http://localhost:8080}

azure:
  storage:
    enabled: false

# Disable authz and audit filters in integration tests
authz:
  http:
    enabled: false

audit:
  http:
    enabled: false
    openapi-rest-spec: court-list-publishing-api.openapi.yml

# Disable CP audit (Artemis) in integration tests
cp:
  audit:
    enabled: false

# Disable JMS health indicator and probes in integration tests
management:
  health:
    jms:
      enabled: false
  endpoint:
    health:
      probes:
        enabled: false

logging:
  level:
    root: INFO
    uk.gov.hmcts.cp: DEBUG

# System user ID for reference data and document generator in integration tests
courtlistpublishing:
  system-user-id: "ba4e97ab-2174-4fa2-abfe-3ac2bb04bc75"

# CaTH endpoint configuration for integration tests
# WireMock runs on the host machine, accessible via host.docker.internal
cath:
  base-url: ${CATH_BASE_URL:http://host.docker.internal:8090}
  endpoint: ${CATH_ENDPOINT:/courtlistpublisher/publication}
  publishing-enabled: ${CATH_PUBLISHING_ENABLED:true}

# Task manager schema (e.g. for job data validation)
taskmanager:
  schema:
    enabled: true

